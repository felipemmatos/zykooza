<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Work4Mob - Kids Videos</title>
<link rel="icon" type="image/png" href="kids-favicon.png">

<!-- Google Analytics GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V70G40YGTF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', 'G-V70G40YGTF', { anonymize_ip:true, transport_type:'beacon' });
</script>

<style>
  :root { --bg:#ffffff; --card:#f3f3f3; --radius:16px; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#111;font:16px/1.4 system-ui,Segoe UI,Roboto,Helvetica,Arial}

  .wrap{max-width:1100px;margin:0 auto;padding:80px 16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:22px}

  .card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.15)}
  .thumb{position:relative;aspect-ratio:16/9;background:#ddd;cursor:pointer}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .duration{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.7);color:#fff;padding:2px 6px;border-radius:8px;font-size:.8rem}
  .fav-btn{
    position:absolute;left:10px;top:10px;z-index:2;
    width:40px;height:40px;border-radius:999px;border:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);color:#fff;font-size:20px;
    cursor:pointer;
  }
  .fav-btn.on{background:rgba(220, 20, 60, .85);}

  .title{padding:10px 12px 14px;font-size:1rem;font-weight:600;color:#111;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  .message{text-align:center;margin-top:16px;color:#444}
  #sentinel{height:40px}

  /* Modal */
  .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.75);z-index:9999;}
  .modal.open{display:flex}

  .player{width:min(96vw,1200px);aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.6);}

  /* iframe 100% */
  .player iframe, #yt-player iframe{
    width:100% !important; height:100% !important; display:block !important; background:#000;
  }

  /* gesto para reexibir controles quando ocultos */
  #gestureLayer{position:absolute;inset:0;z-index:8;background:transparent;display:none;}

  #fallbackLink{
    position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.65);color:#fff;padding:10px 14px;border-radius:10px;display:none;z-index:11;
  }
  #fallbackLink a{color:#fff;text-decoration:underline}

  .controls{
    position:absolute;left:0;right:0;bottom:0;
    padding:12px 14px 18px;display:flex;align-items:center;gap:12px;
    background:linear-gradient(to top,rgba(0,0,0,.55),rgba(0,0,0,.05) 70%, transparent);
    color:#fff;z-index:9;opacity:1;transition:opacity .25s ease;
  }
  .controls.hidden{opacity:0;pointer-events:none;}

  .pp-btn, .fs-btn{
    border:0;border-radius:12px;width:54px;height:50px;background:rgba(255,255,255,.18);backdrop-filter:blur(5px);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;cursor:pointer;
  }
  .fs-btn{font-size:30px}

  .time{font-variant-numeric:tabular-nums;font-size:.9rem;opacity:.9;min-width:64px;text-align:center}

  .seek{-webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:999px;background:rgba(255,255,255,.25);cursor:pointer}
  .seek::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff}
</style>
</head>
<body>

<div class="wrap">
  <div id="grid" class="grid"></div>
  <div id="feedback" class="message">Loading...</div>
  <div id="sentinel"></div>
</div>

<!-- Modal Player -->
<div id="modal" class="modal">
  <div class="player">
    <div id="gestureLayer"></div>
    <div id="yt-player"></div>

    <div class="controls" id="controls" style="display:none;">
      <button class="pp-btn" id="ppBtn">►</button>
      <button class="fs-btn" id="fsBtn">⛶</button>
      <span class="time" id="curT">0:00</span>
      <input type="range" id="seek" class="seek" min="0" max="1000" value="0">
      <span class="time" id="durT">0:00</span>
    </div>
  </div>

  <div id="fallbackLink">
    Unable to embed this video. <a id="openOnYT" target="_blank" rel="noopener">Open on YouTube</a>
  </div>
</div>

<!-- YouTube IFrame API -->
<script>
/* ==== IFrame API readiness as a Promise ==== */
let ytReadyResolve;
const ytReady = new Promise(res => { ytReadyResolve = res; });
window.onYouTubeIframeAPIReady = function(){ ytReadyResolve(); };
(function injectYT(){ const s=document.createElement('script'); s.src='https://www.youtube.com/iframe_api'; document.head.appendChild(s); })();
</script>

<script>
/* ================= CONFIG / CONSTANTS ================= */
/* YouTube API key: not stored in plain text. App may inject window.__ZYT_API_KEY. */
var _kE=[59,48,17,81,99,3,37,109,47,60,56,24,123,60,35,56,91,99,31,7,8,53,56,29,67,97,20,38,51,70,102,46,39,58,15,24,24,63,104];
var _kS="zyk00za_yt_v1";
var _apiKeyCache=null;
function getApiKey(){
  if(typeof window.__ZYT_API_KEY==="string"&&window.__ZYT_API_KEY.length>0) return window.__ZYT_API_KEY;
  if(_apiKeyCache) return _apiKeyCache;
  var o="",i,s=_kS;
  for(i=0;i<_kE.length;i++) o+=String.fromCharCode(_kE[i]^s.charCodeAt(i%s.length));
  _apiKeyCache=o;
  return o;
}
var DEFAULT_CHANNEL = "UC7Pq3Ko42YpkCB_Q4E981jw";
var API_BASE = "https://www.googleapis.com/youtube/v3";

function normalizeCh(v){
  if(!v) return null;
  v = v.trim().replace(/^https?:\/\/(?:www\.)?youtube\.com\//i,"");
  var m;
  m = v.match(/channel\/([^/?#]+)/i); if(m) return m[1];
  m = v.match(/user\/([^/?#]+)/i);    if(m) return m[1];
  return v;
}
var chParam = new URLSearchParams(location.search).get("ch");
var CHANNEL = normalizeCh(chParam) || DEFAULT_CHANNEL;

var state = {channelId:null, uploadsPlaylistId:null, nextPageToken:null, loading:false, finished:false};
var grid = document.getElementById("grid");
var feedback = document.getElementById("feedback");

/* ================= Redirect helper ================= */
function redirectToDefaultChannel() {
  try{
    var url = new URL(window.location.href);
    url.searchParams.set("ch", DEFAULT_CHANNEL);
    if (normalizeCh(chParam) !== DEFAULT_CHANNEL) {
      window.location.replace(url.toString());
      return true;
    }
  }catch(e){}
  return false;
}

/* ================= Utils ================= */
function iso8601ToHMS(t){
  if(!t) return "";
  var m=t.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return "";
  var h=parseInt(m[1]||0,10), mi=parseInt(m[2]||0,10), s=parseInt(m[3]||0,10);
  return h? (h+":"+String(mi).padStart(2,"0")+":"+String(s).padStart(2,"0")) : (mi+":"+String(s).padStart(2,"0"));
}
function pickThumb(sn){
  if (!sn || !sn.thumbnails) return "";
  var t = sn.thumbnails;
  if (t.medium && t.medium.url) return t.medium.url;
  if (t.high && t.high.url) return t.high.url;
  if (t.default && t.default.url) return t.default.url;
  return "";
}
function escapeHTML(s){
  s = s || "";
  return s.replace(/[&<>"']/g, function(ch){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]);
  });
}

/* ================= API wrapper ================= */
function api(path,params){
  var u=new URL(API_BASE+path);
  params.key=getApiKey();
  Object.keys(params).forEach(function(k){ u.searchParams.set(k, params[k]); });
  return fetch(u).then(function(r){
    return r.text().then(function(txt){
      if(!r.ok) throw new Error(txt);
      try { return JSON.parse(txt); } catch(e){ throw new Error("Invalid API response"); }
    });
  });
}

/* ================= Channels ================= */
function resolveChannelId(id){
  return new Promise(function(resolve, reject){
    if(!id){ reject(new Error("No channel")); return; }
    if(id.charAt(0)==="@"){
      api("/channels",{part:"id",forHandle:id.slice(1)})
        .then(function(r){ if(r.items && r.items.length) resolve(r.items[0].id); else tryNext(); })
        .catch(tryNext);
    } else if(/^UC/.test(id)){
      api("/channels",{part:"id",id:id})
        .then(function(r){ if(r.items && r.items.length) resolve(id); else tryNext(); })
        .catch(tryNext);
    } else {
      tryNext();
    }
    function tryNext(){
      api("/channels",{part:"id",forUsername:id})
        .then(function(r){ if(r.items && r.items.length) resolve(r.items[0].id); else reject(new Error("Invalid channel")); })
        .catch(function(){ reject(new Error("Invalid channel")); });
    }
  });
}
function getUploads(id){
  return api("/channels",{part:"contentDetails",id:id})
    .then(function(d){
      var it = d.items && d.items[0];
      if(!it || !it.contentDetails || !it.contentDetails.relatedPlaylists || !it.contentDetails.relatedPlaylists.uploads){
        throw new Error("Uploads playlist not found");
      }
      return it.contentDetails.relatedPlaylists.uploads;
    });
}

/* ================= Cards ================= */
function card(item,map){
  var vid = item.contentDetails.videoId;
  var sn = item.snippet;
  var info = map.get(vid);
  var dur = (info && info.duration) ? iso8601ToHMS(info.duration) : "";
  var title = sn && sn.title ? sn.title : "";
  var thumb = pickThumb(sn);
  return ''+
  '<article class="card">'+
    '<div class="thumb" onclick="openPlayer(\''+vid+'\',\''+escapeHTML(title).replace(/'/g,'&#39;')+'\',\''+thumb+'\')">'+
      '<button class="fav-btn '+(isFav(vid) ? 'on' : '')+'" aria-label="Favorite" onclick="toggleFav(event,\''+vid+'\',\''+escapeHTML(title).replace(/'/g,'&#39;')+'\',\''+thumb+'\')">'+(isFav(vid) ? '♥' : '♡')+'</button>'+
      '<img src="'+thumb+'" alt="">'+
      (dur ? '<span class="duration">'+dur+'</span>' : '')+
    '</div>'+
    '<div class="title">'+escapeHTML(sn.title)+'</div>'+
  '</article>';
}

/* ================= Player ================= */
var modal=document.getElementById("modal"),
    fallback=document.getElementById("fallbackLink"),
    openOnYT=document.getElementById("openOnYT"),
    ytPlayer=null;

var controls=document.getElementById("controls"),
    ppBtn=document.getElementById("ppBtn"),
    fsBtn=document.getElementById("fsBtn"),
    seek=document.getElementById("seek"),
    curT=document.getElementById("curT"),
    durT=document.getElementById("durT");

var playerBox = document.querySelector(".player");
var gestureLayer = document.getElementById("gestureLayer");
var rafId=null, isSeeking=false, durationSec=0;

var hideDelay = 3000;
var hideTimer = null;
function setGestureActive(active){ gestureLayer.style.display = active ? "block" : "none"; }
function showControls(){
  controls.classList.remove("hidden");
  setGestureActive(false);
  clearTimeout(hideTimer);
  hideTimer = setTimeout(hideControls, hideDelay);
}
function hideControls(){
  var st = ytPlayer && ytPlayer.getPlayerState ? ytPlayer.getPlayerState() : -1;
  if (st === 1 && !isSeeking) {
    controls.classList.add("hidden");
    setGestureActive(true);
  }
}
gestureLayer.addEventListener("click", showControls, {passive:true});
gestureLayer.addEventListener("touchstart", showControls, {passive:true});
['mousemove','mouseenter','touchmove','keydown','click'].forEach(function(evt){
  playerBox.addEventListener(evt, function(){ showControls(); }, {passive:true});
});

function fmt(sec){ sec=Math.max(0,Math.floor(sec||0));var m=Math.floor(sec/60),s=sec%60;return m+":"+String(s).padStart(2,"0"); }
function updateUI(){
  if(!ytPlayer || !ytPlayer.getCurrentTime) { rafId = requestAnimationFrame(updateUI); return; }
  var cur = ytPlayer.getCurrentTime() || 0;
  curT.textContent = fmt(cur);
  if(durationSec>0 && !isSeeking){
    seek.value = Math.round((cur/durationSec)*1000);
  }
  // pausa antes do fim para evitar “more videos”
  if(!isSeeking && durationSec>1){
    if(durationSec - cur <= 0.3){
      try{ ytPlayer.pauseVideo(); }catch(e){}
    }
  }
  rafId = requestAnimationFrame(updateUI);
}

/* Fullscreen helpers (container fullscreen) */
function isFullscreen(){ return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement; }
function enterFS(el){
  try{
    if (el.requestFullscreen) return el.requestFullscreen();
    if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
    if (el.msRequestFullscreen) return el.msRequestFullscreen();
  }catch(e){}
}
function exitFS(){
  try{
    if (document.exitFullscreen) return document.exitFullscreen();
    if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
    if (document.msExitFullscreen) return document.msExitFullscreen();
  }catch(e){}
}

function bindControls(){
  controls.style.display="flex";
  setGestureActive(false);

  ppBtn.onclick = function(){
    var st = ytPlayer && ytPlayer.getPlayerState ? ytPlayer.getPlayerState() : -1;
    if(st===1 || st===3){ ytPlayer.pauseVideo(); ppBtn.textContent="►"; showControls(); }
    else{ ytPlayer.playVideo();  ppBtn.textContent="❚❚"; showControls(); }
  };

  fsBtn.onclick = function(){
    if (isFullscreen()) exitFS(); else enterFS(playerBox);
    showControls();
  };

  var startSeek=function(){ isSeeking=true; clearTimeout(hideTimer); };
  var doSeek=function(){
    if(durationSec<=0) return;
    var ratio = seek.value/1000;
    curT.textContent = fmt(ratio*durationSec);
  };
  var endSeek=function(){
    if(durationSec<=0) return;
    var ratio = seek.value/1000;
    ytPlayer.seekTo(ratio*durationSec, true);
    isSeeking=false; showControls();
  };
  seek.addEventListener("mousedown", startSeek);
  seek.addEventListener("touchstart", startSeek, {passive:true});
  seek.addEventListener("input", doSeek);
  seek.addEventListener("mouseup", endSeek);
  seek.addEventListener("touchend", endSeek);
}

/* cria/abre player somente após IFrame API pronta */
async function openPlayer(id, title, thumb){
  recordHistory(id, title, thumb);
  // GA
  if (typeof gtag === 'function') {
    try { gtag('event','video_open',{ video_id:id, channel:CHANNEL }); } catch(_){}
  }

  fallback.style.display="none";
  openOnYT.href="https://www.youtube.com/watch?v="+id;
  modal.classList.add("open");

  // aguarda API
  await ytReady;

  if(!ytPlayer){
    ytPlayer=new YT.Player("yt-player",{
      videoId:id,
      playerVars:{autoplay:1,playsinline:1,controls:0,modestbranding:1,rel:0,iv_load_policy:3,disablekb:1,fs:0},
      events:{onReady:playerReady,onError:playerError,onStateChange:playerState}
    });
  } else {
    ytPlayer.loadVideoById(id);
  }
  showControls();
}

function playerReady(){
  try{ ytPlayer.playVideo(); }catch(e){}
  // permitir fullscreen no iframe
  var ifr = document.querySelector('#yt-player iframe');
  if (ifr){
    ifr.setAttribute('allowfullscreen', '');
    var allow = ifr.getAttribute('allow') || '';
    if (allow.indexOf('fullscreen')===-1) ifr.setAttribute('allow', (allow ? allow + '; ' : '') + 'fullscreen');
  }

  fallback.style.display="none";
  durationSec = Math.floor(ytPlayer && ytPlayer.getDuration ? ytPlayer.getDuration() : 0);
  durT.textContent = fmt(durationSec);
  ppBtn.textContent = "❚❚";
  bindControls();
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(updateUI);
}
function playerError(e){
  if(e && (e.data===101 || e.data===150)) fallback.style.display="block";
  else fallback.style.display="none";
}
function playerState(e){
  var d = e ? e.data : -2;
  if(d===1){ ppBtn.textContent="❚❚"; showControls(); } // playing
  if(d===2){ ppBtn.textContent="►";  showControls(); } // paused
  if(d===0){
    // fecha somente se realmente terminou
    var cur = (ytPlayer && ytPlayer.getCurrentTime) ? ytPlayer.getCurrentTime() : 0;
    var dur = (ytPlayer && ytPlayer.getDuration) ? ytPlayer.getDuration() : 0;
    if(dur>0 && cur>=dur-0.1){
      closeModal();
    }
  }
}
function closeModal(){
  modal.classList.remove("open");
  fallback.style.display="none";
  clearTimeout(hideTimer);
  controls.classList.remove("hidden");
  setGestureActive(false);
  try{ ytPlayer && ytPlayer.stopVideo(); }catch(e){}
  // GA
  if (typeof gtag === 'function') {
    try { gtag('event','video_close',{ page_location: location.href }); } catch(_){}
  }
}
modal.addEventListener("click", function(e){ if(!e.target.closest(".player")) closeModal(); });

/* ================= Watch again / history (native hook) ================= */
function callNativeHistory(vid, title, thumb){
  try{
    var u = "zykooza://history?vid="+encodeURIComponent(vid);
    if (title) u += "&title="+encodeURIComponent(title);
    if (thumb) u += "&thumb="+encodeURIComponent(thumb);
    window.location.href = u;
  }catch(e){}
}
function recordHistory(vid, title, thumb){
  if (!vid) return;
  callNativeHistory(vid, title || "", thumb || "");
}

/* ================= Favorites (local + native hook) ================= */
function favKey(vid){ return "fav:"+vid; }
function isFav(vid){
  try { return localStorage.getItem(favKey(vid)) === "1"; } catch(e) { return false; }
}
function callNativeFavorite(action, vid, title, thumb){
  // WebView hook: intercepted natively in shouldOverrideUrlLoading.
  try{
    var u = "zykooza://favorite?action="+encodeURIComponent(action)+"&vid="+encodeURIComponent(vid);
    if (title) u += "&title="+encodeURIComponent(title);
    if (thumb) u += "&thumb="+encodeURIComponent(thumb);
    window.location.href = u;
  }catch(e){}
}
function toggleFav(ev, vid, title, thumb){
  if (ev) { ev.preventDefault(); ev.stopPropagation(); }
  var now = !isFav(vid);
  try { localStorage.setItem(favKey(vid), now ? "1" : "0"); } catch(e) {}
  callNativeFavorite(now ? "add" : "remove", vid, title, thumb);
  var btn = ev && ev.currentTarget ? ev.currentTarget : null;
  if (btn){
    btn.classList.toggle("on", now);
    btn.textContent = now ? "♥" : "♡";
  }
}

/* ================= Infinite Scroll ================= */
function loadMore(){
  if(state.loading || state.finished) return;
  state.loading = true;

  (function(){
    feedback.textContent="Loading...";

    if(!state.uploadsPlaylistId){
      return resolveChannelId(CHANNEL)
        .then(function(cid){
          if(!cid) throw new Error("Invalid channel");
          state.channelId=cid;
          return getUploads(cid);
        })
        .then(function(up){
          if(!up) throw new Error("Uploads playlist not found");
          state.uploadsPlaylistId=up;
        })
        .catch(function(){
          // Canal inválido / sem uploads → redireciona para padrão
          if (!redirectToDefaultChannel()){
            feedback.textContent = "Error loading videos.";
          }
        });
    }
    return Promise.resolve();
  })().then(function(){
    if(!state.uploadsPlaylistId) return; // já redirecionou ou erro

    var params = { part:"snippet,contentDetails", playlistId:state.uploadsPlaylistId, maxResults:12 };
    if (state.nextPageToken) params.pageToken = state.nextPageToken;

    return api("/playlistItems", params).then(function(list){
      if(!list || !list.items){
        throw new Error("No items");
      }
      state.nextPageToken = list.nextPageToken || null;
      if(!state.nextPageToken) state.finished = true;

      var ids = [];
      for(var i=0;i<list.items.length;i++){
        var it = list.items[i];
        if (it && it.contentDetails && it.contentDetails.videoId) ids.push(it.contentDetails.videoId);
      }
      if(!ids.length){
        feedback.textContent = state.finished ? "End of list." : "";
        return;
      }

      return api("/videos",{part:"contentDetails",id:ids.join(",")})
        .then(function(v){
          var map = new Map();
          var arr = v.items || [];
          for(var j=0;j<arr.length;j++){
            var o = arr[j];
            if(o && o.id && o.contentDetails) map.set(o.id, {duration:o.contentDetails.duration});
          }
          var html = "";
          for(var k=0;k<list.items.length;k++){
            html += card(list.items[k], map);
          }
          grid.insertAdjacentHTML("beforeend", html);
          feedback.textContent = state.finished ? "End of list." : "";

          // GA: lote carregado
          if (typeof gtag === 'function') {
            try { gtag('event','gallery_batch_loaded',{
              playlist_id: state.uploadsPlaylistId || '(none)',
              finished: !!state.finished
            }); } catch(_){}
          }
        });
    });
  }).catch(function(){
    // Qualquer erro no carregamento → redireciona para padrão
    if (!redirectToDefaultChannel()){
      feedback.textContent = "Error loading videos.";
    }
  }).finally(function(){
    state.loading = false;
  });
}
loadMore();

if ("IntersectionObserver" in window){
  new IntersectionObserver(function(es){ if(es[0].isIntersecting) loadMore(); }, {rootMargin:"400px"}).observe(document.getElementById("sentinel"));
} else {
  window.addEventListener("scroll", function(){ if(window.innerHeight + window.scrollY >= (document.body.offsetHeight - 600)) loadMore(); });
}
</script>

</body>
</html>
